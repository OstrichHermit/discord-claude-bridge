<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IM-Claude-Bridge 控制台</title>
    <style>
        :root {
            /* 浅色主题 */
            --bg-primary: #f5f3ef;
            --bg-secondary: #eae8e3;
            --bg-tertiary: #e0ddd5;
            --bg-quaternary: #f5f3ef;
            --bg-hover: #faf8f5;
            --border-color: #d4d0c8;
            --border-light: #e0ddd5;
            --text-primary: #3d3d3d;
            --text-secondary: #5a5853;
            --text-tertiary: #8a8883;
            --text-quaternary: #9a9893;
            --text-quinary: #a8a6a1;
            --text-log: #4a4843;
            --text-timestamp: #9a9893;
            --accent-green: #7aaa74;
            --accent-red: #c87474;
            --btn-restart-bg: #e0ddd5;
            --btn-restart-hover: #d4d0c8;
            --btn-stop-bg: #e8d4d4;
            --btn-stop-hover: #dfc5c5;
            --btn-text-restart: #5a5853;
            --btn-text-stop: #8a5a5a;
            --status-dot: #c8c5be;
            --scrollbar-thumb: #c8c5be;
            --scrollbar-thumb-hover: #b8b5ae;
            --log-btn-bg: #f5f3ef;
            --log-btn-hover: #eae8e3;
            --log-btn-text: #6a6863;
        }

        /* 深色主题 */
        [data-theme="dark"] {
            --bg-primary: #1a1a1a;
            --bg-secondary: #242424;
            --bg-tertiary: #2d2d2d;
            --bg-quaternary: #2a2a2a;
            --bg-hover: #323232;
            --border-color: #3a3a3a;
            --border-light: #333333;
            --text-primary: #e0e0e0;
            --text-secondary: #c0c0c0;
            --text-tertiary: #9a9a9a;
            --text-quaternary: #7a7a7a;
            --text-quinary: #6a6a6a;
            --text-log: #b0b0b0;
            --text-timestamp: #6a6a6a;
            --accent-green: #7aaa74;
            --accent-red: #c87474;
            --btn-restart-bg: #3a3a3a;
            --btn-restart-hover: #444444;
            --btn-stop-bg: #4a3030;
            --btn-stop-hover: #5a3838;
            --btn-text-restart: #c0c0c0;
            --btn-text-stop: #c8a0a0;
            --status-dot: #5a5a5a;
            --scrollbar-thumb: #4a4a4a;
            --scrollbar-thumb-hover: #5a5a5a;
            --log-btn-bg: #2a2a2a;
            --log-btn-hover: #3a3a3a;
            --log-btn-text: #9a9a9a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            overflow: hidden;
            transition: background 0.3s ease, color 0.3s ease;
        }

        /* 左侧边栏 */
        .sidebar {
            width: 200px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            flex-shrink: 0;
            transition: background 0.3s ease, border-color 0.3s ease;
        }

        .app-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-align: center;
            padding: 0 8px;
            letter-spacing: 0.5px;
            width: 100%;
            margin-bottom: 12px;
        }

        .title-text {
            width: 100%;
        }

        /* 状态栏 */
        .status-bar {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            padding: 0 8px;
        }

        /* 状态栏 */
        .status-bar {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            padding: 0 8px;
        }

        .status-bar > * {
            flex: 1;
            justify-content: center;
        }

        /* 主题切换按钮 */
        .theme-toggle {
            background: var(--bg-quaternary);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 6px 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
            color: var(--text-tertiary);
            font-size: 0.7rem;
        }

        .theme-toggle:hover {
            background: var(--bg-hover);
        }

        .theme-icon {
            width: 14px;
            height: 14px;
        }

        .connection-status {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            background: var(--bg-quaternary);
            border-radius: 20px;
            font-size: 0.7rem;
            color: var(--text-quaternary);
            border: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        .connection-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent-green);
        }

        .connection-dot.disconnected {
            background: var(--accent-red);
        }

        /* 组件状态列表 */
        .component-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .component-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 14px;
            background: var(--bg-quaternary);
            border-radius: 8px;
            border: 1px solid var(--border-light);
            transition: all 0.2s ease;
        }

        .component-item:hover {
            background: var(--bg-hover);
            border-color: var(--border-color);
        }

        .component-name {
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 400;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            color: var(--text-tertiary);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--status-dot);
            transition: all 0.3s ease;
        }

        .status-dot.running {
            background: var(--accent-green);
            box-shadow: 0 0 6px rgba(122, 170, 116, 0.4);
        }

        .status-text {
            min-width: 42px;
            text-align: right;
        }

        .component-pid {
            font-size: 0.7rem;
            color: var(--text-quinary);
            margin-top: 2px;
        }

        /* 最后更新时间 */
        .last-update {
            font-size: 0.7rem;
            color: var(--text-quaternary);
        }

        /* 控制按钮区 */
        .control-section {
            margin-top: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
        }

        .control-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 8px;
        }

        .control-label {
            font-size: 0.75rem;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn {
            padding: 11px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 400;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-restart {
            background: var(--btn-restart-bg);
            color: var(--btn-text-restart);
        }

        .btn-restart:hover {
            background: var(--btn-restart-hover);
        }

        .btn-stop {
            background: var(--btn-stop-bg);
            color: var(--btn-text-stop);
        }

        .btn-stop:hover {
            background: var(--btn-stop-hover);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 右侧主区域 */
        .main-content {
            flex: 1;
            padding: 20px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .log-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            flex: 1;
            min-height: 0;
            height: 100%;
        }

        /* 日志面板 */
        .log-panel {
            background: var(--bg-secondary);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid var(--border-color);
            transition: background 0.3s ease, border-color 0.3s ease;
        }

        .log-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            background: var(--bg-tertiary);
            border-bottom: 1px solid var(--border-color);
            transition: background 0.3s ease, border-color 0.3s ease;
        }

        .log-title {
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .log-status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--status-dot);
        }

        .log-status-dot.running {
            background: var(--accent-green);
        }

        .log-actions {
            display: flex;
            gap: 6px;
        }

        .log-btn {
            padding: 4px 8px;
            font-size: 0.7rem;
            background: var(--log-btn-bg);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            cursor: pointer;
            color: var(--log-btn-text);
            transition: all 0.15s ease;
        }

        .log-btn:hover {
            background: var(--log-btn-hover);
        }

        .log-content {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            font-family: 'Consolas', 'Monaco', 'SF Mono', monospace;
            font-size: 0.8rem;
            line-height: 1.5;
            min-height: 0;
            background: var(--bg-primary);
        }

        .log-line {
            padding: 2px 0;
            white-space: pre-wrap;
            word-break: break-all;
            color: var(--text-log);
        }

        .log-timestamp {
            color: var(--text-timestamp);
        }

        /* 滚动条样式 */
        .log-content::-webkit-scrollbar {
            width: 6px;
        }

        .log-content::-webkit-scrollbar-track {
            background: transparent;
        }

        .log-content::-webkit-scrollbar-thumb {
            background: var(--scrollbar-thumb);
            border-radius: 3px;
        }

        .log-content::-webkit-scrollbar-thumb:hover {
            background: var(--scrollbar-thumb-hover);
        }

        /* 响应式 */
        @media (max-width: 1200px) {
            .log-grid {
                grid-template-columns: repeat(2, 1fr);
                grid-template-rows: repeat(2, 1fr);
            }
        }

        @media (max-width: 700px) {
            body {
                flex-direction: column;
                height: auto;
                min-height: 100vh;
                overflow: auto;
            }

            .sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid var(--border-color);
                flex-shrink: 0;
            }

            .main-content {
                height: 500px;
                min-height: 0;
            }

            .log-grid {
                grid-template-columns: 1fr;
                grid-template-rows: repeat(4, 1fr);
            }

            .control-section {
                flex-direction: row;
                margin-top: 10px;
            }

            .btn {
                flex: 1;
            }
        }
    </style>
</head>
<body>
    <!-- 左侧边栏 -->
    <div class="sidebar">
        <div class="app-title">
            <span class="title-text">IM-Claude-Bridge</span>
        </div>
        <div class="status-bar">
            <div class="connection-status">
                <div class="connection-dot disconnected" id="connectionDot"></div>
                <span id="connectionText">连接中...</span>
            </div>
            <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">
                <svg class="theme-icon" id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="5"/>
                    <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
                </svg>
            </button>
        </div>

        <div class="component-list">
            <div class="component-item">
                <div>
                    <div class="component-name">Discord Bot</div>
                    <div class="component-pid" id="discord_bot_pid"></div>
                </div>
                <div class="status-badge">
                    <div class="status-dot" id="discord_bot_dot"></div>
                    <span class="status-text" id="discord_bot_status">--</span>
                </div>
            </div>

            <div class="component-item">
                <div>
                    <div class="component-name">Weixin Bot</div>
                    <div class="component-pid" id="weixin_bot_pid"></div>
                </div>
                <div class="status-badge">
                    <div class="status-dot" id="weixin_bot_dot"></div>
                    <span class="status-text" id="weixin_bot_status">--</span>
                </div>
            </div>

            <div class="component-item">
                <div>
                    <div class="component-name">Claude Bridge</div>
                    <div class="component-pid" id="claude_bridge_pid"></div>
                </div>
                <div class="status-badge">
                    <div class="status-dot" id="claude_bridge_dot"></div>
                    <span class="status-text" id="claude_bridge_status">--</span>
                </div>
            </div>

            <div class="component-item">
                <div>
                    <div class="component-name">Manager</div>
                    <div class="component-pid" id="manager_pid"></div>
                </div>
                <div class="status-badge">
                    <div class="status-dot" id="manager_dot"></div>
                    <span class="status-text" id="manager_status">--</span>
                </div>
            </div>

            <div class="component-item">
                <div>
                    <div class="component-name">Web Server</div>
                    <div class="component-pid" id="web_server_pid"></div>
                </div>
                <div class="status-badge">
                    <div class="status-dot running" id="web_server_dot"></div>
                    <span class="status-text" id="web_server_status">运行中</span>
                </div>
            </div>
        </div>

        <div class="control-section">
            <div class="control-header">
                <div class="control-label">系统控制</div>
                <div class="last-update" id="lastUpdate">--:--:--</div>
            </div>
            <button class="btn btn-restart" onclick="controlAction('restart')">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M23 4v6h-6M1 20v-6h6"/>
                    <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
                </svg>
                重启全部
            </button>
            <button class="btn btn-stop" onclick="controlAction('stop')">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="4" y="4" width="16" height="16" rx="2"/>
                </svg>
                停止全部
            </button>
        </div>
    </div>

    <!-- 右侧主区域 -->
    <div class="main-content">
        <div class="log-grid">
            <div class="log-panel">
                <div class="log-header">
                    <span class="log-title">
                        <span class="log-status-dot" id="log_manager_dot"></span>
                        Manager
                    </span>
                    <div class="log-actions">
                        <button class="log-btn" onclick="clearLog('manager')">清空</button>
                        <button class="log-btn" onclick="scrollToBottom('manager')">底部</button>
                    </div>
                </div>
                <div class="log-content" id="log_manager"></div>
            </div>

            <div class="log-panel">
                <div class="log-header">
                    <span class="log-title">
                        <span class="log-status-dot" id="log_mcp_server_dot"></span>
                        Mcp
                    </span>
                    <div class="log-actions">
                        <button class="log-btn" onclick="clearLog('mcp_server')">清空</button>
                        <button class="log-btn" onclick="scrollToBottom('mcp_server')">底部</button>
                    </div>
                </div>
                <div class="log-content" id="log_mcp_server"></div>
            </div>

            <div class="log-panel">
                <div class="log-header">
                    <span class="log-title">
                        <span class="log-status-dot" id="log_discord_bot_dot"></span>
                        Discord
                    </span>
                    <div class="log-actions">
                        <button class="log-btn" onclick="clearLog('discord_bot')">清空</button>
                        <button class="log-btn" onclick="scrollToBottom('discord_bot')">底部</button>
                    </div>
                </div>
                <div class="log-content" id="log_discord_bot"></div>
            </div>

            <div class="log-panel">
                <div class="log-header">
                    <span class="log-title">
                        <span class="log-status-dot" id="log_weixin_bot_dot"></span>
                        Weixin
                    </span>
                    <div class="log-actions">
                        <button class="log-btn" onclick="clearLog('weixin_bot')">清空</button>
                        <button class="log-btn" onclick="scrollToBottom('weixin_bot')">底部</button>
                    </div>
                </div>
                <div class="log-content" id="log_weixin_bot"></div>
            </div>

            <div class="log-panel">
                <div class="log-header">
                    <span class="log-title">
                        <span class="log-status-dot" id="log_claude_bridge_dot"></span>
                        Bridge
                    </span>
                    <div class="log-actions">
                        <button class="log-btn" onclick="clearLog('claude_bridge')">清空</button>
                        <button class="log-btn" onclick="scrollToBottom('claude_bridge')">底部</button>
                    </div>
                </div>
                <div class="log-content" id="log_claude_bridge"></div>
            </div>
        </div>
    </div>

    <script>
        const components = ['manager', 'mcp_server', 'discord_bot', 'weixin_bot', 'claude_bridge'];
        let wsStatus = null;
        let wsLogs = {};
        const maxLogLines = 200;

        // 主题切换
        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';

            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeIcon(newTheme);
        }

        function updateThemeIcon(theme) {
            const icon = document.getElementById('themeIcon');
            if (theme === 'dark') {
                // 月亮图标
                icon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
            } else {
                // 太阳图标
                icon.innerHTML = '<circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>';
            }
        }

        function initTheme() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            updateThemeIcon(savedTheme);
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            initTheme();
            fetchStatus();
            connectStatusWS();
            components.forEach(comp => connectLogWS(comp));
        });

        // WebSocket: 状态
        function connectStatusWS() {
            const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
            wsStatus = new WebSocket(`${protocol}//${location.host}/ws/status`);

            wsStatus.onopen = () => {
                updateConnectionStatus(true);
            };

            wsStatus.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === 'status_update') {
                    updateStatus(data.data);
                }
            };

            wsStatus.onclose = () => {
                updateConnectionStatus(false);
                setTimeout(connectStatusWS, 2000);
            };

            wsStatus.onerror = () => {
                updateConnectionStatus(false);
            };
        }

        // WebSocket: 日志
        function connectLogWS(component) {
            const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
            const ws = new WebSocket(`${protocol}//${location.host}/ws/logs/${component}`);

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === 'log') {
                    appendLog(component, data.data);
                }
            };

            ws.onopen = () => {
                updateLogStatusDot(component, true);
            };

            ws.onclose = () => {
                updateLogStatusDot(component, false);
                setTimeout(() => connectLogWS(component), 2000);
            };

            wsLogs[component] = ws;
        }

        // 更新连接状态
        function updateConnectionStatus(connected) {
            const dot = document.getElementById('connectionDot');
            const text = document.getElementById('connectionText');
            dot.className = `connection-dot ${connected ? '' : 'disconnected'}`;
            text.textContent = connected ? '已连接' : '重连中...';
        }

        // 更新日志状态点
        function updateLogStatusDot(component, connected) {
            const dot = document.getElementById(`log_${component}_dot`);
            if (dot) {
                dot.className = `log-status-dot ${connected ? 'running' : ''}`;
            }
        }

        // 更新组件状态
        function updateStatus(status) {
            // 更新时间显示
            document.getElementById('lastUpdate').textContent = `最后更新: ${new Date().toLocaleTimeString()}`;

            for (const [component, info] of Object.entries(status)) {
                const dot = document.getElementById(`${component}_dot`);
                const statusEl = document.getElementById(`${component}_status`);
                const pidEl = document.getElementById(`${component}_pid`);

                if (dot) {
                    dot.className = `status-dot${info.running ? ' running' : ''}`;
                }
                if (statusEl) {
                    statusEl.textContent = info.running ? '运行中' : '已停止';
                }
                if (pidEl) {
                    pidEl.textContent = info.pid ? `PID: ${info.pid}` : '';
                }

                // 同步日志面板的状态点
                if (components.includes(component)) {
                    updateLogStatusDot(component, info.running);
                }
            }
        }

        // 添加日志行
        function appendLog(component, line) {
            const viewer = document.getElementById(`log_${component}`);
            if (!viewer) return;

            const lineEl = document.createElement('div');
            lineEl.className = 'log-line';
            lineEl.innerHTML = formatLogLine(line);
            viewer.appendChild(lineEl);

            // 自动滚动到底部
            viewer.scrollTop = viewer.scrollHeight;

            // 限制最大行数
            while (viewer.children.length > maxLogLines) {
                viewer.removeChild(viewer.firstChild);
            }
        }

        // 格式化日志行
        function formatLogLine(line) {
            const timestampMatch = line.match(/^\[(\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2})\]/);
            if (timestampMatch) {
                return `<span class="log-timestamp">[${timestampMatch[1]}]</span>${line.substring(timestampMatch[0].length)}`;
            }
            return line;
        }

        // 清空日志
        function clearLog(component) {
            const viewer = document.getElementById(`log_${component}`);
            if (viewer) {
                viewer.innerHTML = '';
            }
        }

        // 滚动到底部
        function scrollToBottom(component) {
            const viewer = document.getElementById(`log_${component}`);
            if (viewer) {
                viewer.scrollTop = viewer.scrollHeight;
            }
        }

        // 获取状态
        async function fetchStatus() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                updateStatus(data.status);
            } catch (e) {
                console.error('Failed to fetch status:', e);
            }
        }

        // 控制操作
        async function controlAction(action) {
            const actionText = action === 'restart' ? '重启' : '停止';
            if (!confirm(`确定要${actionText}所有服务吗？`)) {
                return;
            }

            const btn = document.querySelector(`.btn-${action}`);
            const originalHTML = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = `<span>执行中...</span>`;

            try {
                const res = await fetch(`/api/control/${action}`, { method: 'POST' });
                const data = await res.json();
                if (data.success) {
                    console.log(`${action} executed successfully`);
                }
            } catch (e) {
                console.error(`Failed to ${action}:`, e);
            } finally {
                setTimeout(() => {
                    btn.disabled = false;
                    btn.innerHTML = originalHTML;
                    fetchStatus();
                }, 2000);
            }
        }
    </script>
</body>
</html>
