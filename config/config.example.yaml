# Discord Bot 配置
discord:
  token: "YOUR_DISCORD_BOT_TOKEN_HERE"
  # 从 https://discord.com/developers/applications 获取
  # 允许的频道 ID 列表（空列表表示所有频道）
  allowed_channels: []
  # 允许的用户 ID 列表（空列表表示所有用户）
  allowed_users: []
  # 启动通知配置（可选，留空则不发送启动通知）
  startup_notification_channel: ""  # 频道 ID（留空）
  startup_notification_user: ""  # 用户 ID（私聊）
  # 表情包目录配置
  # 用于 <:文件名.扩展名> 格式的表情包自动发送
  # 支持相对路径和绝对路径，相对路径基于项目根目录
  stickers_path: "./stickers"

# Claude Code 桥接配置
claude:
  # claude 可执行文件路径（如果已在 PATH 中可省略）
  executable: "claude"
  # 每次对话的启动超时时间（秒）
  timeout: 30
  # Claude Code 最大调用尝试次数（包括第一次调用）
  # 例如设置为 1 表示最多尝试 1 次（不重试）
  # 例如设置为 3 表示最多尝试 3 次（1次原始调用 + 2次重试）
  max_attempts: 3
  # 工作目录（可选，留空则使用当前目录）
  # 对于需要访问特定项目文件的任务很有用
  working_directory: ""
  # 并发配置
  # 最大并发 session 数（0 = 无限制）
  # 每个 session 会启动一个独立的 Worker，并发处理不同频道的消息
  max_concurrent_sessions: 5
  # Worker 空闲超时时间（秒）
  # 超过此时间没有消息的 Worker 会被清理，释放资源（0 = 永不清理）
  worker_idle_timeout: 300

# 文件下载配置
file_download:
  # 默认下载目录（支持相对路径和绝对路径）
  # 相对路径基于工作区根目录（D:/AgentWorkspace）
  default_directory: "./downloads"

# 文件映射表配置
file_mapping:
  # Discord 附件 ID 和本地文件名映射表存储路径
  # 支持相对路径和绝对路径，相对路径基于项目根目录
  path: "./shared/file_mapping.json"
  
# 消息队列配置
queue:
  # 消息数据库路径
  database_path: "./shared/messages.db"
  # 消息轮询间隔（毫秒）
  poll_interval: 500
  # 消息保留时间（小时，0 = 永久保留）
  message_retention_hours: 24
  # 消息发送间隔（秒）
  send_interval: 1.5

# 消息分割配置
message_splitting:
  # 是否启用消息按空行分割功能
  # 启用后会根据空行（两个连续换行符）将消息分割成多个 block
  # 禁用后会将整个消息作为一个 block 发送
  enabled: true

# 首次对话提示词注入配置
auto_load:
  # 首次对话提示词注入，可用于加载系统
  enabled: false
  # 加载记忆的提示文本（会添加到消息前面）
  prompt_text: "加载记忆。"

# Typing indicator 配置（"正在输入"状态）
typing_indicator:
  # 最大连续重试次数（网络波动时）
  max_retries: 3
  # 重试等待时间（秒）
  retry_delay: 5

# 消息超时配置
timeout:
  # PENDING 状态超时时间（秒）
  # 超过此时间未收到 Claude Bridge 响应时，发送超时提示
  pending: 30

# 工具调用通知配置
tool_use_notification:
  # 是否启用工具调用通知（以 Embed 卡片形式转发工具调用信息）
  enabled: true
  # 工具 emoji 映射配置
  emoji_mapping:
    # ==================== Claude Code 内置工具 ====================
    # 文件操作
    Read: "📄"
    Write: "✍️"
    Edit: "✏️"
    Glob: "📁"
    Grep: "🔍"

    # 命令执行
    Bash: "⚡"

    # Web 相关
    WebSearch: "🌐"

    # Skill
    Skill: "📖"

    # Agent
    Agent: "🤖"

    # 计划模式
    EnterPlanMode: "📋"
    ExitPlanMode: "✅"

    # 用户交互
    AskUserQuestion: "❓"

    # 任务管理
    TodoWrite: "✅"

    # 任务控制
    TaskOutput: "📤"
    TaskStop: "🛑"

    # Jupyter
    NotebookEdit: "📓"

    # MCP 资源
    ListMcpResourcesTool: "📚"
    ReadMcpResourceTool: "📖"

    # Worktree
    EnterWorktree: "🌳"
    ExitWorktree: "🚪"

    # ==================== MCP 服务器 emoji 映射 ====================
    # 映射格式：服务器名: emoji
    # 适用于该服务器下的所有工具
      
    jina-mcp-server: "🌐"
    brave-search: "🌐"
    im-claude-bridge: "💬"
    
    # ==================== MCP 具体工具 emoji 映射 ====================
    # MCP 具体工具 emoji 映射（优先级高于服务器映射）
    # 格式：mcp__服务器名__工具名
    # im-claude-bridge 定时任务相关
  
    mcp__im-claude-bridge__add_cron: "⏰"
    mcp__im-claude-bridge__delete_cron: "⏰"
    mcp__im-claude-bridge__get_cron_info: "⏰"
    mcp__im-claude-bridge__list_cron: "⏰"
    mcp__im-claude-bridge__toggle_cron: "⏰"
    mcp__im-claude-bridge__update_cron: "⏰"
    mcp__im-claude-bridge__get_current_time: "⏰"

# 定时任务调度器配置
cron_scheduler:
  # 是否启用定时任务调度器
  enabled: true
  # 定时任务存储路径（JSON 文件）
  storage_path: "./shared/cron_jobs.json"

# MCP 服务器配置
mcp_server:
  # 传输模式：stdio 或 http
  transport: "http"
  # HTTP 模式监听地址（仅 http 模式生效）
  host: "127.0.0.1"
  # HTTP 模式监听端口（仅 http 模式生效）
  port: 3334

# Web 服务器配置
web_server:
  # HTTP 监听地址
  host: "127.0.0.1"
  # HTTP 监听端口
  port: 8088

# 微信 Bot 配置
weixin:
  # 是否启用微信 Bot
  enabled: true

  # 微信账号存储文件路径（扫码登录后自动保存）
  accounts_file: "./shared/weixin_accounts.json"

  # 使用方法：
  # 1. 运行扫码登录工具：python scripts/login_weixin.py
  # 2. 使用微信扫描二维码并确认登录
  # 3. 账号信息会自动保存到 accounts_file
  # 4. 启动微信 Bot（会自动加载已登录的账号）

  # 微信消息分割配置（独立开关，不影响 Discord）
  message_splitting:
    # 是否启用消息按空行分割功能
    # 注意：由于微信 context_token 限制（10条消息），关闭分割可以减少配额消耗
    enabled: false

  # 微信工具调用通知配置（独立开关，不影响 Discord）
  tool_use_notification:
    # 是否启用工具调用通知
    # 注意：每次工具执行都会发送通知，会消耗 context_token 配额
    enabled: false
